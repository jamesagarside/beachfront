name: Sandcastle (autonomous agent)

# Headless Sandcastle loop. This is the engine behind Beachfront's "agents running"
# view (see docs/adr/0006). It drains `ready-for-agent` issues and opens a PR per run.
#
# Required repo Secret:
#   CLAUDE_CODE_OAUTH_TOKEN  (run `claude setup-token` locally and paste the result)
#   — or set ANTHROPIC_API_KEY instead and swap the env line below.
#
# The agent's reads/commits use the built-in GITHUB_TOKEN. The PR is opened with a
# GitHub App installation token instead, because a PR opened by GITHUB_TOKEN does not
# trigger CI (GitHub's anti-recursion rule) — see #51 / ADR-0007. Optional repo Secrets:
#   BEACHFRONT_APP_ID, BEACHFRONT_APP_PRIVATE_KEY  (the App is created/installed once;
#   the onboarder sets these per repo). If absent, the PR falls back to GITHUB_TOKEN and
#   CI will NOT run on it.

on:
  workflow_dispatch: {}
  issues:
    # labeled: an issue moves to ready-for-agent (e.g. via triage).
    # opened:  an issue is created already ready-for-agent (e.g. via /to-issues).
    types: [opened, labeled]
  # A merge to main closes a blocker AND lands its code — so newly-unblocked work
  # can start immediately, paced by your merges instead of the clock. Only human
  # merges push to main; agent PRs target sandcastle/auto-* branches, so no runaway.
  push:
    branches: [main]
  # Backstop only now — catches anything the event triggers miss (e.g. bursts the
  # concurrency guard collapsed). Tune the cron.
  schedule:
    - cron: "0 */6 * * *"

# Never run two loops at once against the same repo.
concurrency:
  group: sandcastle
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run:
    # Run for dispatch/schedule always; for issue events only when the issue is
    # ready-for-agent — whether the label was just added or present at creation.
    if: >-
      ${{
        github.event_name != 'issues' ||
        (github.event.action == 'labeled' && github.event.label.name == 'ready-for-agent') ||
        (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'ready-for-agent'))
      }}
    runs-on: ubuntu-latest
    # Surfaced so the App-token step can be conditionally skipped when no App is
    # configured (secrets aren't usable directly in a step `if:`).
    env:
      BF_APP_ID: ${{ secrets.BEACHFRONT_APP_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `ci`) so this same template works in any onboarded repo,
      # whose lockfile may not be perfectly in sync with the injected sandcastle deps.
      # This install only needs to provide `tsx` + the Sandcastle CLI to LAUNCH the
      # loop on the host; the agent does its own install inside the sandbox.
      - run: npm install --no-audit

      # Keep the host working tree pristine before the loop runs. The loop's
      # branch strategy (merge-to-head) ends with a host-side `git merge`, which
      # aborts if any tracked file is dirty. `npm install` above can rewrite a
      # drifted package-lock.json and dirty the tree — discard that churn so the
      # merge always sees a clean tree. Untracked/ignored files (node_modules,
      # .sandcastle/.env) are left untouched. See docs/adr/0011.
      - name: Keep the host tree clean for merge-to-head
        run: git checkout -- .

      - name: Write Sandcastle env from secrets
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .sandcastle
          {
            echo "CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}"
            echo "GH_TOKEN=${GH_TOKEN}"
          } > .sandcastle/.env

      - name: Build the sandbox image
        run: npx @ai-hero/sandcastle docker build-image

      - name: Run the loop
        env:
          CI: "true"
        run: npm run sandcastle

      # The Actions summary only shows the SyncError, not the real worker log
      # (Sandcastle tails it to .sandcastle/logs/** inside the runner). On
      # failure, print those logs inline AND upload them so a broken run is
      # diagnosable without re-running. Runs even when the loop step fails.
      - name: Surface the worker log on failure
        if: failure()
        run: |
          echo "::group::.sandcastle/logs"
          for f in .sandcastle/logs/*.log; do
            [ -e "$f" ] || { echo "(no logs found)"; break; }
            echo "===== $f ====="
            cat "$f"
          done
          echo "::endgroup::"

      - name: Upload the worker log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandcastle-logs-${{ github.run_id }}
          path: .sandcastle/logs/**
          if-no-files-found: ignore
          retention-days: 14

      # Mint a short-lived GitHub App installation token to open the PR with. Skipped
      # when no App is configured; the next step then falls back to GITHUB_TOKEN.
      - name: Mint the PR-opener token (GitHub App, if configured)
        id: pr_token
        if: ${{ env.BF_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BEACHFRONT_APP_ID }}
          private-key: ${{ secrets.BEACHFRONT_APP_PRIVATE_KEY }}

      - name: Open a PR and move worked issues to in-progress
        # App token if we minted one (so CI triggers on the PR), else GITHUB_TOKEN.
        env:
          GH_TOKEN: ${{ steps.pr_token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "sandcastle[bot]"
          git config user.email "sandcastle@users.noreply.github.com"
          if git diff --quiet origin/main; then
            echo "No changes produced by the loop — nothing to PR."
            exit 0
          fi
          BRANCH="sandcastle/auto-${GITHUB_RUN_ID}"
          git switch -c "$BRANCH"
          git push origin "$BRANCH"
          # Worked issues, from the agent's `Closes #N` commit lines.
          ISSUES="$(git log origin/main..HEAD --format=%B | grep -oiE 'closes +#[0-9]+' | grep -oE '[0-9]+' | sort -u)"
          # Put `Closes #N` in the PR BODY so the issue closes on merge under ANY merge
          # method (a commit-only reference can be dropped by squash merges).
          BODY="Automated by the headless Sandcastle loop. Review before merging."
          for n in $ISSUES; do BODY="${BODY}"$'\n'"Closes #${n}"; done
          gh pr create --base main --head "$BRANCH" \
            --title "Sandcastle: automated work from run ${GITHUB_RUN_ID}" \
            --body "$BODY"
          # Move each worked issue out of the queue (host-side — never depends on the
          # agent detecting CI). On merge, the PR body's `Closes #N` closes the issue.
          for n in $ISSUES; do
            echo "Marking #$n in-progress"
            gh issue edit "$n" --remove-label ready-for-agent --add-label in-progress || true
          done
